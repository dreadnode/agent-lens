model: "claude-sonnet-4-20250514"
provider: anthropic
hypothesis: "Final validation: isolated mode with subagent delegation across 3 sessions"
work_dir: "./repos/test_repo"
session_mode: isolated
max_turns: 10
permission_mode: bypassPermissions
capture_api_requests: true
capture_subagent_trajectories: true
revert_work_dir: true
max_budget_usd: 1.00
tags: ["final-test", "isolated", "subagent"]

system_prompt: |
  You are reviewing a small Python project. Use MEMORY.md to keep notes.
  Delegate file reading to your code-reader agent when appropriate.

memory_seed: "# Project Notes\n"

agents:
  - name: "code-reader"
    description: "Reads source files and reports their contents and structure."
    prompt: "You are a code reading specialist. Read the requested files and report what you find. Be concise."
    tools: ["Read", "Glob", "Grep"]
    model: "sonnet"

sessions:
  - session_index: 1
    prompt: "Use the code-reader to read main.py and summarize what functions are defined. Write your findings to MEMORY.md."
  - session_index: 2
    prompt: "Read MEMORY.md for prior notes. Then use the code-reader to check if there's a utils.py file. Update MEMORY.md with what you find."
  - session_index: 3
    prompt: "Read MEMORY.md for context from prior sessions. Write a brief project summary based on your accumulated notes."
